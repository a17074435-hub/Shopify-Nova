<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 36" fill="none" role="img" aria-label="NovaLights">
  <defs>
    <!-- Icon gradient: purple top-left → cyan bottom-right -->
    <linearGradient id="g-icon" x1="4" y1="4" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="55%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <!-- Text gradient: purple left → silver right -->
    <linearGradient id="g-text" x1="46" y1="0" x2="196" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="48%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>

  <!-- ─── Orbit arc: center(18,18) r=16, open at bottom ─── -->
  <!-- Lower-left endpoint: 18+16·cos150°=4, 18+16·sin150°=26 -->
  <!-- Lower-right endpoint: 18+16·cos30°=32, 18+16·sin30°=26  -->
  <!-- large-arc=1, sweep=1 → clockwise over the top            -->
  <path d="M 4 26 A 16 16 0 1 1 32 26"
        stroke="url(#g-icon)"
        stroke-width="2.2"
        stroke-linecap="round"/>

  <!-- ─── N letter: bars + diagonal ─── -->
  <!-- Left bar -->
  <rect x="7" y="9" width="5" height="19" rx="0.5" fill="url(#g-icon)"/>
  <!-- Diagonal: (12,9)–(16,9) top  →  (20,28)–(24,28) bottom -->
  <polygon points="12,9 16,9 24,28 20,28" fill="url(#g-icon)"/>
  <!-- Right bar -->
  <rect x="24" y="9" width="5" height="19" rx="0.5" fill="url(#g-icon)"/>

  <!-- ─── Sparkles ─── -->
  <!-- Large 4-point star at (29.5, 9.5) -->
  <path d="M 29.5 5.5 L 30.3 8.7 L 33.5 9.5 L 30.3 10.3 L 29.5 13.5 L 28.7 10.3 L 25.5 9.5 L 28.7 8.7 Z"
        fill="#A855F7"/>
  <!-- Medium star at (23.5, 4.5) -->
  <path d="M 23.5 2 L 24.1 4 L 26.1 4.5 L 24.1 5.1 L 23.5 7 L 22.9 5.1 L 20.9 4.5 L 22.9 4 Z"
        fill="#818CF8" opacity="0.88"/>
  <!-- Tiny dots -->
  <circle cx="20" cy="3.5" r="1.1" fill="#A855F7" opacity="0.65"/>
  <circle cx="27.5" cy="3"   r="0.8" fill="#60A5FA" opacity="0.5"/>
  <circle cx="21.5" cy="6.5" r="0.7" fill="#818CF8" opacity="0.45"/>

  <!-- ─── NOVALIGHTS text ─── -->
  <text x="46" y="25"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="17"
        font-weight="700"
        letter-spacing="2.8"
        fill="url(#g-text)">NOVALIGHTS</text>
</svg>
